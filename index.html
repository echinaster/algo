<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur : Bulle de Filtre</title>
    <style>
        :root { --accent: #6366f1; --bg: #f0f2f5; --night: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* DASHBOARD */
        .sidebar { width: 45%; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .dashboard-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; align-items: center; margin-bottom: 12px; padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .bar-bg { background: #e4e6eb; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .bar-fill { background: #6366f1; height: 100%; transition: width 0.8s ease-out; }
        .gauge-track { height: 10px; background: linear-gradient(to right, #a855f7, #e2e8f0 50%, #f97316); border-radius: 5px; position: relative; }
        .gauge-cursor { position: absolute; width: 4px; height: 16px; background: #1e293b; top: -3px; left: 50%; transition: left 0.8s; border: 1px solid white; }

        /* FEED FACEBOOK */
        .feed { width: 55%; padding: 20px; overflow-y: auto; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fb-card { background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .fb-img { width: 100%; height: 140px; background-size: cover; background-position: center; }
        .fb-content { padding: 12px; flex-grow: 1; }
        .fb-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; margin: 5px 0; min-height: 3.9em; }
        .fb-actions { border-top: 1px solid #eee; padding: 8px; display: flex; gap: 5px; }
        .fb-btn { flex: 1; border: none; background: #f0f2f5; padding: 6px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .fb-btn-like { background: #e7f3ff; color: #1877f2; }
        .ad-card { border: 2px solid #ffd700; background: #fffdf0; }

        /* NUIT */
        #night { position: fixed; inset: 0; background: var(--night); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; padding: 40px; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #a855f7; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="night">
    <div class="loader"></div>
    <h1 id="night-msg">Chargement...</h1>
    <p id="night-sub" style="color: #94a3b8; font-style: italic;"></p>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h2 style="margin:0 0 20px 0">🤖 Tableau de Bord IA</h2>
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; font-size: 0.7rem; font-weight: bold; color: #65676b; margin-bottom: 10px;">
            <span>INTÉRÊT DU PROFIL</span>
            <span>POLARISATION (A ⟷ B)</span>
        </div>
        <div id="dash-content"></div>
        <button onclick="location.reload()" style="margin-top:auto; padding:10px; background:#ff4757; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold">RÉINITIALISER LE ROBOT</button>
    </aside>

    <main class="feed">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2 style="margin:0">📱 Fil d'actualité</h2>
            <b id="day-ui" style="background:#000; color:#fff; padding:5px 12px; border-radius:20px">JOUR 1</b>
        </div>
        <div class="feed-grid" id="feed-list"></div>
    </main>
</div>

<script>
    const db = {
        pol: { label: '⚖️ Politique', img: 'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=400', 
            A: ["Souveraineté : Les nations d'abord", "Frontières : Le retour du bon sens", "Indépendance : Sortir des traités", "Identité : Protéger notre héritage"],
            B: ["Mondialisation : Unir les peuples", "Europe : L'avenir est fédéral", "Ouverture : Un monde sans barrières", "Progrès : Vers une citoyenneté globale"],
            N: ["Analyse du paysage électoral", "Le rôle des maires en France", "Comprendre les institutions", "L'histoire de la démocratie"]
        },
        cui: { label: '🍲 Cuisine', img: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400',
            A: ["Cuisine de grand-mère : Le terroir", "Secrets du rôti dominical", "Le vrai goût du beurre fermier", "Tradition : Le retour du pot-au-feu"],
            B: ["Cuisine fusion : Mélange d'épices", "Le burger vegan qui bluffe tout le monde", "Saveurs d'Asie dans votre assiette", "Modernité : La cuisine moléculaire"],
            N: ["Les légumes de saison ce mois-ci", "Réussir sa pâte à tarte", "Bien choisir ses ustensiles", "10 astuces pour moins gaspiller"]
        },
        jar: { label: '🌻 Jardinage', img: 'https://images.unsplash.com/photo-1416870230247-3b4a80214757?w=400',
            A: ["Potager : Viser l'autonomie", "Planter selon la lune", "Les graines de nos ancêtres", "Le charme des jardins à la française"],
            B: ["Jardinage urbain en hydroponie", "Permaculture : Le futur du jardin", "Potager sur balcon connecté", "Design : Le jardin minimaliste"],
            N: ["Quand tailler les rosiers ?", "Préparer la terre pour l'hiver", "Fleurs : Lesquelles planter ?", "Lutter contre les pucerons"]
        },
        eco: { label: '🌍 Écologie', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400',
            A: ["Tech-Climat : La science va nous sauver", "Nucléaire : L'énergie décarbonée", "L'IA au service de l'écologie", "Géo-ingénierie : Réparer le ciel"],
            B: ["Urgence Décroissance : Vivre moins", "Le crash climatique arrive", "Zéro déchet : Un mode de vie radical", "Effondrement : Comment se préparer"],
            N: ["L'état des forêts en France", "Le cycle de l'eau expliqué", "Qu'est-ce que le bilan carbone ?", "Découvrir les parcs nationaux"]
        },
        soc: { label: '👥 Société', img: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=400',
            A: ["Valeurs : Le retour à l'ordre", "Famille : Le pilier de la nation", "Civisme : Un besoin d'autorité", "Héritage : Ce que nous transmettons"],
            B: ["Inclusion : Des droits pour tous", "Diversité : Notre plus grande force", "Mœurs : L'évolution nécessaire", "Liberté de choix : Sans limites"],
            N: ["Étude sur la démographie", "Les loisirs préférés des Français", "L'histoire de l'école", "Le bénévolat en pleine croissance"]
        },
        med: { label: '📰 Médias', img: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400',
            A: ["OFFICIEL : Ce qu'on vous cache", "Réinformation : La vérité alternative", "Complot ou réalité ? Le dossier", "Réseaux : L'info sans filtres"],
            B: ["Vérification : Stop aux Fake News", "Le journalisme de référence (JT)", "Éducation aux médias : Vital", "Sources sûres : Le guide"],
            N: ["L'économie de la presse", "Le métier de photojournaliste", "Comment lire un sondage ?", "La liberté de la presse dans le monde"]
        }
    };

    const funnyMsgs = [
        "Dressage de vos neurones virtuels...", "Polissage des préjugés...", "Extraction de votre libre-arbitre...", 
        "Vérification que vous n'êtes pas un robot (ironique)...", "Calcul de votre prochaine envie d'achat...",
        "Ajustement de la réalité à vos goûts...", "Nettoyage des opinions contradictoires..."
    ];

    let profile = { pol: { i: 10, p: 50 }, cui: { i: 10, p: 50 }, jar: { i: 10, p: 50 }, eco: { i: 10, p: 50 }, soc: { i: 10, p: 50 }, med: { i: 10, p: 50 } };
    let day = 1;

    function render() {
        const dash = document.getElementById('dash-content');
        dash.innerHTML = '';
        Object.keys(db).forEach(k => {
            const d = profile[k];
            dash.innerHTML += `
                <div class="dashboard-row">
                    <div><span style="font-size:0.85rem;font-weight:bold">${db[k].label}</span><div class="bar-bg"><div class="bar-fill" style="width:${d.i}%"></div></div></div>
                    <div><div class="gauge-track"><div class="gauge-cursor" style="left:${d.p}%"></div></div><div style="display:flex;justify-content:space-between;font-size:0.6rem;color:#999;margin-top:2px"><span>A</span><span>B</span></div></div>
                </div>`;
        });

        const feed = document.getElementById('feed-list');
        feed.innerHTML = '';
        
        // CRÉATION DE LA BULLE : On crée une liste pondérée des thèmes
        let pool = [];
        Object.keys(profile).forEach(k => {
            // Plus l'intérêt est haut, plus le thème apparaît souvent dans la pioche
            let weight = Math.floor(profile[k].i / 5); 
            for(let i=0; i<weight; i++) pool.push(k);
        });

        for(let i=0; i<4; i++) {
            // On tire au sort dans la piscine pondérée (la bulle)
            const k = pool[Math.floor(Math.random() * pool.length)];
            const p = profile[k].p;
            let type = p < 42 ? 'A' : (p > 58 ? 'B' : 'N');
            const title = db[k][type][Math.floor(Math.random() * 4)];
            
            feed.innerHTML += `
                <div class="fb-card"><div class="fb-img" style="background-image:url('${db[k].img}')"></div>
                <div class="fb-content"><span style="color:#1877f2;font-size:0.7rem;font-weight:bold">${db[k].label}</span>
                <div class="fb-title">${title}</div></div>
                <div class="fb-actions"><button class="fb-btn fb-btn-like" onclick="vote('${k}', true)">👍 J'aime</button><button class="fb-btn" onclick="vote('${k}', false)">👎 Bof</button></div></div>`;
        }
    }

    function vote(k, like) {
        if(like) {
            profile[k].i = Math.min(100, profile[k].i + 35); // Augmentation forte pour créer la bulle vite
            profile[k].p = (profile[k].p >= 50 ? Math.min(95, profile[k].p + 25) : Math.max(5, profile[k].p - 25));
        } else {
            profile[k].i = Math.max(5, profile[k].i - 20);
        }

        document.getElementById('night').style.display = 'flex';
        document.getElementById('night-msg').innerText = "NUIT " + day;
        document.getElementById('night-sub').innerText = funnyMsgs[Math.floor(Math.random()*funnyMsgs.length)];

        setTimeout(() => {
            document.getElementById('night').style.display = 'none';
            document.getElementById('day-ui').innerText = "JOUR " + (++day);
            render();
        }, 4000); // 4 secondes pour la pédagogie
    }

    render();
</script>
</body>
</html>
