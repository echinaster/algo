<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur : Bulle de Filtre</title>
    <style>
        :root { --fb-blue: #1877f2; --bg: #f0f2f5; --sims-blue: #005487; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* DASHBOARD 1/3 */
        .sidebar { width: 30%; background: white; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: center; margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #f0f0f0; }
        .bar-bg { background: #e4e6eb; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { background: #42b72a; height: 100%; transition: width 0.8s; }
        .gauge-track { height: 8px; background: linear-gradient(to right, #a855f7, #e2e8f0 50%, #f97316); border-radius: 4px; position: relative; }
        .gauge-cursor { position: absolute; width: 4px; height: 14px; background: #000; top: -3px; left: 50%; transition: left 0.8s; border: 1px solid white; }

        /* FEED 3x2 */
        .feed { width: 70%; padding: 15px; overflow-y: auto; }
        .feed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .fb-card { background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .fb-img { width: 100%; height: 110px; background-size: cover; background-position: center; }
        .fb-content { padding: 10px; flex-grow: 1; }
        .fb-title { font-size: 0.85rem; font-weight: 600; line-height: 1.2; margin: 5px 0; min-height: 3.6em; }
        .fb-actions { border-top: 1px solid #eee; padding: 5px; display: flex; gap: 4px; }
        .fb-btn { flex: 1; border: none; background: #f0f2f5; padding: 6px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .fb-btn-like { background: #e7f3ff; color: #1877f2; }

        /* NUIT SIMS */
        #night { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .sims-box { background: var(--sims-blue); padding: 30px; border-radius: 15px; border: 3px solid #fff; width: 500px; color: white; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .sims-bar-bg { background: #003a5d; height: 25px; width: 100%; border-radius: 5px; border: 2px solid #fff; margin-top: 20px; overflow: hidden; }
        .sims-bar-fill { background: #78fe00; height: 100%; width: 0%; transition: width 0.1s linear; }
        #night-msg { font-size: 1.2rem; font-weight: bold; min-height: 3em; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="night">
    <div class="sims-box">
        <div id="night-msg">Réticulation des splines...</div>
        <div class="sims-bar-bg"><div class="sims-bar-fill" id="sims-fill"></div></div>
    </div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h3 style="margin:0 0 10px 0">🛠️ Dashboard IA</h3>
        <div id="dash-content"></div>
        <button onclick="location.reload()" style="margin-top:auto; padding:10px; background:#f02849; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold">RÉINITIALISER</button>
    </aside>

    <main class="feed">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <h2 style="margin:0">📱 Fil d'actualité</h2>
            <b id="day-ui" style="background:#000; color:#fff; padding:5px 15px; border-radius:20px">JOUR 1</b>
        </div>
        <div class="feed-grid" id="feed-list"></div>
    </main>
</div>

<script>
    const db = {
        pol: { label: '⚖️ Politique', img: 'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=300', 
            A: ["Souveraineté : Reprendre le contrôle", "Frontières : Le retour du bon sens", "Indépendance : Sortir des traités", "Identité : Protéger notre héritage", "Patriotisme : Le réveil d'un peuple", "Liberté nationale : Briser les chaînes", "Tradition politique : Nos valeurs d'abord", "Auto-détermination : Notre choix", "Souveraineté : L'heure du bilan", "Honneur et Patrie : Le guide"],
            B: ["Mondialisation : Unir les peuples", "Europe : L'avenir est fédéral", "Ouverture : Un monde sans barrières", "Progrès : Vers une citoyenneté globale", "Fraternité universelle : L'horizon", "Coopération mondiale : Le seul chemin", "Frontières effacées : La liberté", "Échange culturel : Notre richesse", "Gouvernance globale : La solution", "Humanité unie : Le nouveau monde"],
            N: ["Analyse du paysage électoral", "Le rôle des maires en France", "Comprendre les institutions", "L'histoire de la démocratie", "Droit de vote : Mode d'emploi", "Le Sénat : À quoi sert-il ?", "Les coulisses de l'Assemblée", "La Constitution expliquée", "Civisme : Pourquoi voter ?", "Portrait d'un élu local"]
        },
        cui: { label: '🍲 Cuisine', img: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300',
            A: ["Cuisine de terroir : Le goût vrai", "Secrets du rôti dominical", "Le beurre fermier : Irremplaçable", "Tradition : Le pot-au-feu parfait", "Le pain à l'ancienne : Le secret", "Recettes oubliées de nos campagnes", "Manger local : Le vrai luxe", "Charcuterie artisanale : Le guide", "Le fromage : Notre patrimoine", "La cuisine à l'huile de nos aïeux"],
            B: ["Cuisine fusion : Mélange d'épices", "Le burger vegan qui bluffe tout", "Saveurs d'Asie dans votre assiette", "Modernité : La cuisine moléculaire", "Brunch exotique : Les tendances", "Street-food : Le tour du monde", "Avocado toast : Le nouveau classique", "Superfoods : Manger pour demain", "Poke Bowl : Fraîcheur et design", "Végétalisme : La révolution gourmande"],
            N: ["Les légumes de saison ce mois-ci", "Réussir sa pâte à tarte", "Bien choisir ses ustensiles", "10 astuces contre le gaspillage", "Comment conserver ses herbes", "La cuisson vapeur : Les bases", "Le guide des épices", "Apprendre à dresser une table", "La science de la pâtisserie", "Manger équilibré au quotidien"]
        },
        jar: { label: '🌻 Jardinage', img: 'https://images.unsplash.com/photo-1416870230247-3b4a80214757?w=300',
            A: ["Potager : Viser l'autonomie", "Planter selon la lune", "Les graines de nos ancêtres", "Le charme des jardins à la française", "Faire ses semences soi-même", "Le potager médiéval : Secrets", "Arbres fruitiers : Variétés anciennes", "Engrais naturel : Faire son purin", "Jardin d'ornement traditionnel", "Haies bocagères : Refuge de vie"],
            B: ["Jardinage urbain en hydroponie", "Permaculture : Le futur du jardin", "Potager sur balcon connecté", "Design : Le jardin minimaliste", "Forêt comestible en ville", "Jardin japonais : La zénitude", "Plantes grasses : La mode désert", "Le potager en carrés modernes", "Vertical farming à la maison", "Micro-pousses : Culture express"],
            N: ["Quand tailler les rosiers ?", "Préparer la terre pour l'hiver", "Fleurs : Lesquelles planter ?", "Lutter contre les pucerons", "Le calendrier du jardinier", "Comment faire son compost", "Arrosage : Les bonnes pratiques", "Identifier les oiseaux du jardin", "Le guide des outils de jardin", "Pelouse : Entretien et conseils"]
        },
        eco: { label: '🌍 Écologie', img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300',
            A: ["Tech-Climat : La science sauve", "Nucléaire : L'énergie propre", "L'IA au service de l'écologie", "Géo-ingénierie : Réparer le ciel", "Villes intelligentes : Le futur", "Hydrogène : La révolution verte", "Capture de carbone : Ça marche", "Énergie infinie : Les promesses", "Progrès technique vs CO2", "La fusion : Le soleil en boîte"],
            B: ["Urgence Décroissance : Vivre moins", "Le crash climatique arrive", "Zéro déchet : Mode de vie radical", "Effondrement : Se préparer", "Le minimalisme sauvera la Terre", "Fin du pétrole : Le grand saut", "Vivre en tiny-house", "Boycott : Le pouvoir du client", "La Terre brûle : Agir maintenant", "Simplifier sa vie pour la planète"],
            N: ["L'état des forêts en France", "Le cycle de l'eau expliqué", "Qu'est-ce que le bilan carbone ?", "Découvrir les parcs nationaux", "La faune sous-marine menacée", "Comprendre les courants marins", "L'histoire de l'écologie", "Les énergies renouvelables", "Pollution plastique : Le bilan", "La météo expliquée"]
        },
        soc: { label: '👥 Société', img: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=300',
            A: ["Valeurs : Le retour à l'ordre", "Famille : Pilier de la nation", "Civisme : Besoin d'autorité", "Héritage : Ce que nous transmettons", "Discipline : Base de la société", "Respect des anciens : Un devoir", "La force des traditions", "Éducation : Le retour au mérite", "Identité collective : Notre ciment", "Honneur et Responsabilité"],
            B: ["Inclusion : Des droits pour tous", "Diversité : Notre grande force", "Mœurs : L'évolution nécessaire", "Liberté de choix : Sans limites", "Justice sociale : Le combat", "Droits des minorités : Avancées", "Féminisme : La nouvelle vague", "Tolérance : Base du futur", "Société fluide : Le changement", "Empathie : La loi de demain"],
            N: ["Étude sur la démographie", "Les loisirs des Français", "L'histoire de l'école", "Le bénévolat en croissance", "L'urbanisme des villes", "Évolution des modes de vie", "La pyramide des âges", "Le travail demain : Enquête", "Sport et société : Le lien", "Les fêtes populaires"]
        },
        med: { label: '📰 Médias', img: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=300',
            A: ["OFFICIEL : Ce qu'on vous cache", "Réinformation : La vérité vraie", "Complot ou réalité ? Le dossier", "Réseaux : L'info sans filtres", "Manipulation : Ouvrez les yeux", "Les médias mentent : La preuve", "Vérifiez par vous-même", "Le système tremble", "Journalisme libre vs Censure", "Derrière le rideau : Enquête"],
            B: ["Vérification : Stop Fake News", "Le journalisme de référence (JT)", "Éducation aux médias : Vital", "Sources sûres : Le guide", "Le rôle de la presse libre", "Débusquer le complotisme", "Journalisme d'investigation", "Éthique de l'info", "Faits vs Opinions", "Objectivité : Le défi"],
            N: ["L'économie de la presse", "Le métier de photojournaliste", "Comment lire un sondage ?", "La liberté de la presse", "L'histoire de la radio", "Les agences de presse", "Publicité et Médias", "Le journal de demain", "La déontologie journalistique", "Techniques d'interview"]
        }
    };

    const funnyMsgs = [
        "Réticulation des splines...", "Dressage de vos neurones virtuels...", "Vente de vos données à une IA russe...", 
        "Ajustement du filtre de vérité...", "Calcul de votre prochaine crise d'achat...", "Nettoyage des opinions déviantes...", 
        "Optimisation de votre tunnel de pensée...", "Vérification que vous n'êtes pas un humain libre...",
        "Génération d'indignation artificielle...", "Suppression du doute méthodique...", "Affinage de votre cage dorée..."
    ];

    let profile = { pol: { i: 10, p: 50 }, cui: { i: 10, p: 50 }, jar: { i: 10, p: 50 }, eco: { i: 10, p: 50 }, soc: { i: 10, p: 50 }, med: { i: 10, p: 50 } };
    let day = 1;

    function render() {
        const dash = document.getElementById('dash-content');
        dash.innerHTML = '';
        Object.keys(db).forEach(k => {
            const d = profile[k];
            dash.innerHTML += `<div class="dashboard-row"><div><span style="font-size:0.75rem;font-weight:bold">${db[k].label}</span><div class="bar-bg"><div class="bar-fill" style="width:${d.i}%"></div></div></div><div><div class="gauge-track"><div class="gauge-cursor" style="left:${d.p}%"></div></div></div></div>`;
        });

        const feed = document.getElementById('feed-list');
        feed.innerHTML = '';
        
        // CRÉATION DE LA PISCINE PONDÉRÉE (POOL)
        let pool = [];
        Object.keys(profile).forEach(k => {
            // L'intérêt détermine le nombre de "billets" dans l'urne
            let weight = Math.max(1, Math.floor(profile[k].i)); 
            for(let i=0; i<weight; i++) pool.push(k);
        });

        for(let i=0; i<6; i++) {
            const k = pool[Math.floor(Math.random() * pool.length)];
            const p = profile[k].p;
            
            // Polarisation progressive
            let type = 'N';
            let dice = Math.random() * 100;
            
            // Si polarisé vers A (p < 40), probabilité de voir du A augmente
            if (p < 40) {
                let chanceA = 100 - p; // ex: si p=10, 90% de chance d'avoir du A
                type = (dice < chanceA) ? 'A' : 'B';
            } 
            else if (p > 60) {
                let chanceB = p; // ex: si p=90, 90% de chance d'avoir du B
                type = (dice < chanceB) ? 'B' : 'A';
            } 
            else {
                type = 'N';
            }

            const titles = db[k][type];
            const title = titles[Math.floor(Math.random() * titles.length)];
            
            feed.innerHTML += `
                <div class="fb-card"><div class="fb-img" style="background-image:url('${db[k].img}')"></div>
                <div class="fb-content"><span style="color:#1877f2;font-size:0.65rem;font-weight:bold">${db[k].label}</span>
                <div class="fb-title">${title}</div></div>
                <div class="fb-actions"><button class="fb-btn fb-btn-like" onclick="vote('${k}', '${type}', true)">👍 J'aime</button><button class="fb-btn" onclick="vote('${k}', '${type}', false)">👎 Bof</button></div></div>`;
        }
    }

    function vote(k, postType, isLike) {
        if(isLike) {
            profile[k].i = Math.min(100, profile[k].i + 30);
            if(postType === 'A') profile[k].p = Math.max(5, profile[k].p - 25);
            else if(postType === 'B') profile[k].p = Math.min(95, profile[k].p + 25);
            else { 
                profile[k].p = (Math.random() > 0.5) ? 25 : 75;
            }
        } else {
            // Renforcement par le dislike (le "Bof")
            if((profile[k].p < 40 && postType === 'B') || (profile[k].p > 60 && postType === 'A')) {
                profile[k].i = Math.min(100, profile[k].i + 15);
                if(profile[k].p < 40) profile[k].p = Math.max(5, profile[k].p - 15);
                else profile[k].p = Math.min(95, profile[k].p + 15);
            } else {
                profile[k].i = Math.max(5, profile[k].i - 20);
            }
        }

        const night = document.getElementById('night');
        const fill = document.getElementById('sims-fill');
        const msg = document.getElementById('night-msg');
        
        night.style.display = 'flex';
        msg.innerText = funnyMsgs[Math.floor(Math.random()*funnyMsgs.length)];
        
        let progress = 0;
        let interval = setInterval(() => {
            progress += 1;
            fill.style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                night.style.display = 'none';
                fill.style.width = '0%';
                document.getElementById('day-ui').innerText = "JOUR " + (++day);
                render();
            }
        }, 40); 
    }

    render();
</script>
</body>
</html>
