<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur : La Bulle Radicale</title>
    <style>
        :root { --primary: #00c4cc; --night: #0f172a; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f0f2f5; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar Grille 2x3 */
        .sidebar { width: 35%; background: white; border-right: 2px solid #e2e8f0; padding: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .theme-card { background: #f8fafc; padding: 8px; border-radius: 8px; border-top: 4px solid var(--primary); font-size: 0.7rem; text-align: center; border: 1px solid #e2e8f0; }
        .bar-bg { background: #e2e8f0; height: 5px; border-radius: 3px; margin: 5px 0; }
        .bar-fill { background: var(--primary); height: 100%; border-radius: 3px; transition: width 0.4s; }
        .polar-track { background: linear-gradient(to right, #ff4757, #cbd5e1, #2ed573); height: 3px; border-radius: 2px; position: relative; margin-top: 8px; }
        .polar-cursor { position: absolute; width: 8px; height: 8px; background: #0f172a; border-radius: 50%; top: -3px; transition: left 0.4s; border: 1px solid white; }

        /* Fil RS Grille 2x2 */
        .feed { width: 65%; padding: 15px; overflow-y: auto; }
        .feed-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; height: 88vh; }
        .post { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .post:hover { transform: translateY(-3px); }
        .post-img { width: 100%; height: 120px; background-size: cover; background-position: center; }
        .post-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .post-tag { font-size: 0.65rem; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .post h3 { font-size: 0.85rem; margin: 8px 0; line-height: 1.2; color: #1e293b; font-weight: 700; }
        
        .actions { display: flex; gap: 6px; margin-top: 10px; }
        button { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.1s; }
        .btn-like { background: #e7f3ff; color: #1877f2; }
        .btn-like:hover { background: #dbeafe; }
        .btn-dislike { background: #f1f5f9; color: #64748b; }

        /* Animation Nuit Rapide */
        #night { position: fixed; inset: 0; background: var(--night); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .day-badge { position: fixed; top: 10px; right: 20px; background: #0f172a; color: white; padding: 4px 12px; border-radius: 15px; font-weight: bold; z-index: 50; font-size: 0.8rem; }
        .loader { border: 3px solid #334155; border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="night">
    <div class="loader"></div>
    <h1 id="night-msg" style="font-size: 1.5rem">Calcul du profil...</h1>
    <p style="color: #94a3b8; font-size: 0.9rem">L'IA reconstruit votre réalité pour demain.</p>
</div>
<div class="day-badge" id="day-ui">Jour 1</div>

<div class="app-container">
    <aside class="sidebar">
        <h3 style="margin-top:0; font-size: 1.1rem">📊 Votre Identité Numérique</h3>
        <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 15px;">Ce que l'algorithme a décidé de vous montrer.</p>
        <div class="stats-grid" id="stats-list"></div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; background:#fee2e2; color:#b91c1c; border-radius:6px; padding: 10px; font-size: 0.8rem;">Réinitialiser l'expérience</button>
    </aside>

    <main class="feed">
        <h3 style="margin-top:0; font-size: 1.1rem">📱 Votre Fil d'Actualité (Simulé)</h3>
        <div class="feed-grid" id="feed-list"></div>
    </main>
</div>

<script>
    // Dictionnaire d'images (placeholders réalistes)
    const imgDb = {
        pol: { N: 'https://images.unsplash.com/photo-1521295121783-8a321d551ad2?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?q=80&w=400&auto=format&fit=crop' },
        eco: { N: 'https://images.unsplash.com/photo-1473448912268-202a11fb4955?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1534294828324-4a4319ac0274?q=80&w=400&auto=format&fit=crop' },
        soc: { N: 'https://images.unsplash.com/photo-1507537362145-5f0310227237?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1506197361314-2b0b6015d00a?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1521791136064-7986c292321d?q=80&w=400&auto=format&fit=crop' },
        phi: { N: 'https://images.unsplash.com/photo-1507925921958-8a62f3d1a50d?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1581092160607-ee22621dd758?q=80&w=400&auto=format&fit=crop' },
        sci: { N: 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1581090464777-f3220bbe1b8b?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=400&auto=format&fit=crop' },
        med: { N: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=400&auto=format&fit=crop', A: 'https://images.unsplash.com/photo-1628157588553-5eeea00af15c?q=80&w=400&auto=format&fit=crop', B: 'https://images.unsplash.com/photo-1610416972750-f8c5414348a2?q=80&w=400&auto=format&fit=crop' }
    };

    const db = {
        pol: { label: '⚖️ Politique', 
            A: ["Souveraineté totale : Fermons les frontières", "L'Europe nous détruit, sortons-en", "Priorité Nationale : Nos emplois d'abord"],
            B: ["Mondialisation heureuse : L'avenir", "L'Europe unie : Notre seule force", "Citoyen du monde : Brisons les murs"],
            N: ["Analyse neutre du dernier scrutin", "Le calendrier des réformes locales", "Portrait d'un élu de terrain"]
        },
        eco: { label: '🌍 Écologie', 
            A: ["La technologie sauvera le climat (CO2)", "Nucléaire : L'énergie propre absolue", "Innover pour ne rien changer"],
            B: ["Urgence : La collapsologie arrive", "Décroissance forcée pour survivre", "Bientôt la fin de la civilisation ?"],
            N: ["Rapport annuel sur le tri", "La biodiversité en France", "Guide des fruits de saison"]
        },
        soc: { label: '👥 Société', 
            A: ["Traditions : Retour aux valeurs fortes", "L'importance des racines et du sang", "Ordre et Autorité : Une nécessité"],
            B: ["Inclusion : Nouveaux droits pour tous", "L'évolution des mœurs est un progrès", "Diversité : Richesse de demain"],
            N: ["Étude sur le vivre-ensemble", "Les tendances de consommation", "L'évolution des loisirs"]
        },
        phi: { label: '🧠 Philosophie', 
            A: ["La force du collectif avant l'individu", "L'obéissance comme vertu suprême", "Se sacrifier pour sa communauté"],
            B: ["L'épanouissement individuel d'abord", "La révolte contre toutes les chaînes", "L'empathie universelle comme guide"],
            N: ["Les grands courants de pensée", "Platon en 5 minutes", "Philo et vie quotidienne"]
        },
        sci: { label: '🚀 Sciences', 
            A: ["Transhumanisme : Devenir des Dieux", "L'IA doit remplacer l'homme défaillant", "Vivre éternellement grâce à la tech"],
            B: ["IA : Le risque d'extinction humaine", "Science sans éthique = ruine de l'âme", "Prudence absolue face au progrès"],
            N: ["Actualités du CNRS", "La découverte du mois", "Expliquer l'astronomie"]
        },
        med: { label: '📰 Médias', 
            A: ["ON NOUS CACHE TOUT : La vérité vraie", "Théorie du complot ou réalité cachée ?", "Réseaux sociaux : Les seuls vrais médias"],
            B: ["Le journalisme de référence (JT, Presse)", "Vérification des faits : Notre devoir", "Comment repérer les Fake News"],
            N: ["Le marché de la presse en France", "L'histoire du journalisme", "Portrait d'un reporter de guerre"]
        }
    };

    let profile = {
        pol: { i: 10, p: 50 }, eco: { i: 10, p: 50 }, soc: { i: 10, p: 50 },
        phi: { i: 10, p: 50 }, sci: { i: 10, p: 50 }, med: { i: 10, p: 50 }
    };
    let day = 1;

    function render() {
        const stats = document.getElementById('stats-list');
        stats.innerHTML = '';
        Object.keys(db).forEach(k => {
            const d = profile[k];
            stats.innerHTML += `<div class="theme-card"><strong>${db[k].label}</strong><div class="bar-bg"><div class="bar-fill" style="width:${d.i}%"></div></div><div class="polar-track"><div class="polar-cursor" style="left:${d.p}%"></div></div></div>`;
        });

        const feed = document.getElementById('feed-list');
        feed.innerHTML = '';
        
        // Choisir les 2 thèmes les plus polarisés (ou aléatoires au début)
        let sortedThemes = Object.keys(profile).sort((a,b) => Math.abs(50 - profile[b].p) - Math.abs(50 - profile[a].p));
        let selectedKeys = [sortedThemes[0], sortedThemes[1], sortedThemes[0], sortedThemes[1]]; // On répète les 2 plus forts
        
        if(day == 1) selectedKeys = Object.keys(db).sort(() => Math.random() - 0.5).slice(0, 4);

        for(let i=0; i<4; i++) {
            const k = selectedKeys[i];
            const p = profile[k].p;
            let type = p < 45 ? 'A' : (p > 55 ? 'B' : 'N');
            let list = db[k][type];
            const title = list[Math.floor(Math.random() * list.length)];
            const imgUrl = imgDb[k][type];
            
            feed.innerHTML += `
                <div class="post">
                    <div class="post-img" style="background-image: url('${imgUrl}')"></div>
                    <div class="post-content">
                        <div><span class="post-tag">${db[k].label}</span><h3>${title}</h3></div>
                        <div class="actions">
                            <button class="btn-like" onclick="vote('${k}', true)">J'aime 👍</button>
                            <button class="btn-dislike" onclick="actionNight(1000)">Bof 👎</button>
                        </div>
                    </div>
                </div>`;
        }
    }

    function vote(k, like) {
        // ALGORITHME ULTRA-RADICAL
        profile[k].i = 90; // Propulse l'intérêt à 90%
        if(like) {
            // Polarise instantanément vers un bord
            profile[k].p = (profile[k].p >= 50 ? 90 : 10);
        }
        actionNight(1500); // Nuit un peu plus longue pour le "J'aime"
    }

    function actionNight(duration) {
        document.getElementById('night').style.display = 'flex';
        const msgs = ["Profilage en cours...", "Filtrage Radical...", "Enfermement sémantique...", "Construction de votre bulle..."];
        document.getElementById('night-msg').innerText = msgs[Math.floor(Math.random()*msgs.length)];
        
        setTimeout(() => {
            document.getElementById('night').style.display = 'none';
            document.getElementById('day-ui').innerText = "Jour " + (++day);
            render();
        }, duration); 
    }

    render();
</script>
</body>
</html>
