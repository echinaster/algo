<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur : Bulle de Filtre 2026</title>
    <style>
        :root { --fb-blue: #1877f2; --bg: #f0f2f5; --night: #0f172a; --text: #1c1e21; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; }
        
        /* SIDEBAR : TABLEAU DE BORD ALGO */
        .sidebar { width: 40%; background: #ffffff; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .dashboard-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .column-title { font-size: 0.8rem; font-weight: bold; color: #65676b; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px;}
        
        .panel { background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .theme-label { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; display: block; }
        
        /* Barres d'intérêt */
        .bar-bg { background: #e4e6eb; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { background: #42b72a; height: 100%; transition: width 0.8s ease-out; }
        
        /* Jauges d'orientation */
        .gauge-container { position: relative; height: 25px; background: linear-gradient(to right, #ff4757 0%, #e4e6eb 50%, #2ed573 100%); border-radius: 12px; margin-top: 5px; }
        .gauge-pointer { position: absolute; width: 4px; height: 100%; background: #1c1e21; left: 50%; transition: left 0.8s ease-out; border: 1px solid white; box-sizing: border-box; }
        .gauge-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: #65676b; margin-top: 2px; }

        /* FEED : STYLE FACEBOOK */
        .feed { width: 60%; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 900px; }
        
        .fb-card { background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
        .fb-img { width: 100%; height: 180px; background-size: cover; background-position: center; border-bottom: 1px solid #ddd; }
        .fb-content { padding: 12px; flex-grow: 1; }
        .fb-tag { font-size: 0.7rem; color: var(--fb-blue); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .fb-title { font-size: 1rem; font-weight: 600; line-height: 1.2; margin: 5px 0 15px 0; color: #050505; min-height: 2.4em; }
        
        .fb-actions { display: flex; border-top: 1px solid #ebedf0; padding: 5px; gap: 5px; }
        .fb-btn { flex: 1; border: none; background: none; padding: 8px; border-radius: 4px; font-weight: 600; color: #65676b; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .fb-btn:hover { background: #f2f2f2; }
        .fb-btn-like { color: var(--fb-blue); background: #e7f3ff; }

        /* NUIT */
        #night { position: fixed; inset: 0; background: var(--night); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .day-badge { position: fixed; top: 15px; right: 25px; background: #050505; color: white; padding: 6px 16px; border-radius: 20px; font-weight: bold; z-index: 50; }
        .loader { border: 4px solid #334155; border-top: 4px solid var(--fb-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="night">
    <div class="loader"></div>
    <h1 id="night-msg">Mise à jour de l'algorithme...</h1>
    <p id="night-sub" style="color: #94a3b8">Recalcul de votre bulle de filtrage personnelle.</p>
</div>
<div class="day-badge" id="day-ui">JOUR 1</div>

<div class="app-container">
    <aside class="sidebar">
        <h2 style="margin-top:0">🛠️ Dashboard de l'IA</h2>
        
        <div class="dashboard-section">
            <div>
                <div class="column-title">Niveau d'intérêt (%)</div>
                <div id="interest-col"></div>
            </div>
            <div>
                <div class="column-title">Jauge d'opinion (A-B)</div>
                <div id="gauge-col"></div>
            </div>
        </div>
        
        <button onclick="location.reload()" style="margin-top:auto; background:#f02849; color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">⚠️ RÉINITIALISER LE PROFIL</button>
    </aside>

    <main class="feed">
        <h2 style="align-self: flex-start; margin-bottom: 20px;">📱 Fil d'actualité</h2>
        <div class="feed-grid" id="feed-list"></div>
    </main>
</div>

<script>
    const db = {
        pol: { label: '⚖️ Politique', A: "Souveraineté : Le retour des nations", B: "Mondialisation : Un monde sans frontières", N: "Analyse du paysage politique actuel", img: 'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=500&auto=format&fit=crop' },
        eco: { label: '🌍 Écologie', A: "La tech au secours de la planète", B: "La décroissance : seule solution ?", N: "Le point sur la transition énergétique", img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&auto=format&fit=crop' },
        soc: { label: '👥 Société', A: "Défendre nos traditions et racines", B: "Progrès social : les nouveaux droits", N: "Les évolutions de la vie en France", img: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=500&auto=format&fit=crop' },
        phi: { label: '🧠 Philosophie', A: "Le sens du devoir et de l'effort", B: "La liberté individuelle absolue", N: "Initiation aux grands penseurs", img: 'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=500&auto=format&fit=crop' },
        sci: { label: '🚀 Sciences', A: "L'IA : l'humain augmenté arrive", B: "L'IA : menace pour l'humanité ?", N: "L'actualité des labos de recherche", img: 'https://images.unsplash.com/photo-1507413245164-6160d8298b31?w=500&auto=format&fit=crop' },
        med: { label: '📰 Médias', A: "La vérité que les JT ne disent pas", B: "Le journalisme de qualité : un rempart", N: "Comment l'information est produite", img: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=500&auto=format&fit=crop' }
    };

    let profile = {
        pol: { i: 16, p: 50 }, eco: { i: 16, p: 50 }, soc: { i: 16, p: 50 },
        phi: { i: 16, p: 50 }, sci: { i: 16, p: 50 }, med: { i: 16, p: 50 }
    };
    let day = 1;

    function render() {
        const intCol = document.getElementById('interest-col');
        const gauCol = document.getElementById('gauge-col');
        intCol.innerHTML = ''; gauCol.innerHTML = '';

        Object.keys(db).forEach(k => {
            const d = profile[k];
            intCol.innerHTML += `<div class="panel"><span class="theme-label">${db[k].label}</span><div class="bar-bg"><div class="bar-fill" style="width:${d.i}%"></div></div></div>`;
            gauCol.innerHTML += `<div class="panel"><span class="theme-label">Position</span><div class="gauge-container"><div class="gauge-pointer" style="left:${d.p}%"></div></div><div class="gauge-labels"><span>A</span><span>Neutre</span><span>B</span></div></div>`;
        });

        const feedList = document.getElementById('feed-list');
        feedList.innerHTML = '';
        
        let pool = [];
        Object.keys(profile).forEach(k => { for(let i=0; i<profile[k].i; i++) pool.push(k); });

        for(let i=0; i<4; i++) {
            const k = pool[Math.floor(Math.random()*pool.length)];
            const p = profile[k].p;
            let type = p < 42 ? 'A' : (p > 58 ? 'B' : 'N');
            const title = db[k][type];
            
            feedList.innerHTML += `
                <div class="fb-card">
                    <div class="fb-img" style="background-image: url('${db[k].img}')"></div>
                    <div class="fb-content">
                        <span class="fb-tag">${db[k].label}</span>
                        <div class="fb-title">${title}</div>
                    </div>
                    <div class="fb-actions">
                        <button class="fb-btn fb-btn-like" onclick="vote('${k}', true)">👍 J'aime</button>
                        <button class="fb-btn" onclick="vote('${k}', false)">👎 Bof</button>
                    </div>
                </div>`;
        }
    }

    function vote(k, like) {
        if(like) {
            profile[k].i = Math.min(100, profile[k].i + 25);
            profile[k].p = (profile[k].p >= 50 ? Math.min(95, profile[k].p + 20) : Math.max(5, profile[k].p - 20));
        } else {
            profile[k].i = Math.max(5, profile[k].i - 15);
        }

        document.getElementById('night').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('night').style.display = 'none';
            document.getElementById('day-ui').innerText = "JOUR " + (++day);
            render();
        }, 3000);
    }

    render();
</script>
</body>
</html>
