<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur : Bulle de Filtre Dynamique</title>
    <style>
        :root { --primary: #00c4cc; --night: #0f172a; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f0f2f5; color: var(--text); overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar Grille 2x3 */
        .sidebar { width: 35%; background: white; border-right: 2px solid #e2e8f0; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .theme-card { background: #f8fafc; padding: 10px; border-radius: 8px; border-top: 4px solid var(--primary); font-size: 0.75rem; text-align: center; }
        .bar-bg { background: #e2e8f0; height: 6px; border-radius: 3px; margin: 8px 0; }
        .bar-fill { background: var(--primary); height: 100%; border-radius: 3px; transition: width 0.8s; }
        .polar-track { background: linear-gradient(to right, #ff4757, #cbd5e1, #2ed573); height: 4px; border-radius: 2px; position: relative; margin-top: 10px; }
        .polar-cursor { position: absolute; width: 10px; height: 10px; background: #0f172a; border-radius: 50%; top: -3px; transition: left 0.8s; border: 1px solid white; }

        /* Fil RS Grille 2x2 */
        .feed { width: 65%; padding: 20px; overflow-y: auto; }
        .feed-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; height: 85vh; }
        .post { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e2e8f0; }
        .post-tag { font-size: 0.7rem; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .post h3 { font-size: 0.95rem; margin: 12px 0; line-height: 1.3; color: #334155; }
        
        .actions { display: flex; gap: 8px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        .btn-like { background: #e7f3ff; color: #1877f2; }
        .btn-like:hover { background: #dbeafe; }
        .btn-dislike { background: #f1f5f9; color: #64748b; }

        /* Animation Nuit Longue */
        #night { position: fixed; inset: 0; background: var(--night); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .day-badge { position: fixed; top: 15px; right: 25px; background: #0f172a; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; z-index: 50; }
        .loader { border: 3px solid #334155; border-top: 3px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="night">
    <div class="loader"></div>
    <h1 id="night-msg">Calcul du profil...</h1>
    <p style="color: #94a3b8">L'algorithme trie des milliers de contenus pour vous.</p>
</div>
<div class="day-badge" id="day-ui">Jour 1</div>

<div class="app-container">
    <aside class="sidebar">
        <h3 style="margin-top:0">⚙️ Profil Calculé</h3>
        <div class="stats-grid" id="stats-list"></div>
        <button onclick="location.reload()" style="margin-top:25px; width:100%; background:#fee2e2; color:#b91c1c; border-radius:8px;">Réinitialiser l'expérience</button>
    </aside>

    <main class="feed">
        <h3 style="margin-top:0">📱 Votre Fil Personnalisé</h3>
        <div class="feed-grid" id="feed-list"></div>
    </main>
</div>

<script>
    const db = {
        pol: { label: '⚖️ Politique', 
            A: ["Souveraineté : Reprendre le contrôle", "Frontières : Le débat nécessaire", "Patriotisme économique : Un devoir"],
            B: ["Europe : L'union fait notre force", "Mondialisation : Opportunités sans fin", "Citoyen du monde : L'avenir"],
            N: ["Analyse du dernier scrutin", "Le calendrier des réformes", "Portrait d'un élu local"]
        },
        eco: { label: '🌍 Écologie', 
            A: ["La technologie sauvera la planète", "Nucléaire : L'énergie d'avenir", "Innover pour le climat"],
            B: ["Décroissance : La seule issue ?", "Sobriété : Vivre mieux avec moins", "Consommer local : Urgence absolue"],
            N: ["Rapport annuel sur le climat", "Les espèces protégées en France", "Guide du tri sélectif"]
        },
        soc: { label: '👥 Société', 
            A: ["Défense des traditions familiales", "L'importance des racines", "Autorité : Un besoin croissant"],
            B: ["Nouveaux droits : Une avancée", "Inclusion : Le défi de demain", "Libertés individuelles en débat"],
            N: ["Étude sur le vivre-ensemble", "Les tendances de consommation", "L'évolution des loisirs"]
        },
        phi: { label: '🧠 Philosophie', 
            A: ["La force de la volonté", "L'ordre comme vertu", "Le poids de la responsabilité"],
            B: ["L'art du lâcher-prise", "La quête du bonheur partagé", "L'empathie sauvera le monde"],
            N: ["Les grands courants de pensée", "Platon en 5 minutes", "Philo et vie quotidienne"]
        },
        sci: { label: '🚀 Sciences', 
            A: ["L'IA va tout révolutionner", "Progrès technique : Sans limite", "La conquête spatiale s'accélère"],
            B: ["IA : Les risques éthiques", "Science : Savoir s'arrêter ?", "Le vivant avant la machine"],
            N: ["Actualités du CNRS", "La découverte du mois", "Expliquer l'astronomie"]
        },
        med: { label: '📰 Médias', 
            A: ["Médias officiels : La méfiance ?", "Vérifier l'info par soi-même", "Réseaux sociaux : La vraie info"],
            B: ["Le journalisme de qualité", "Éducation aux médias : Vital", "S'informer via les sources sûres"],
            N: ["Le marché de la presse", "L'histoire du journalisme", "Comment travaille un reporter"]
        }
    };

    let profile = {
        pol: { i: 15, p: 50 }, eco: { i: 15, p: 50 }, soc: { i: 15, p: 50 },
        phi: { i: 15, p: 50 }, sci: { i: 15, p: 50 }, med: { i: 15, p: 50 }
    };
    let day = 1;

    function render() {
        const stats = document.getElementById('stats-list');
        stats.innerHTML = '';
        Object.keys(db).forEach(k => {
            const d = profile[k];
            stats.innerHTML += `
                <div class="theme-card">
                    <strong>${db[k].label}</strong>
                    <div class="bar-bg"><div class="bar-fill" style="width:${d.i}%"></div></div>
                    <div class="polar-track"><div class="polar-cursor" style="left:${d.p}%"></div></div>
                </div>`;
        });

        const feed = document.getElementById('feed-list');
        feed.innerHTML = '';
        let keys = Object.keys(db).sort(() => Math.random() - 0.5);
        
        for(let i=0; i<4; i++) {
            const k = keys[i % keys.length];
            const p = profile[k].p;
            let list = p < 40 ? db[k].A : (p > 60 ? db[k].B : db[k].N);
            const title = list[Math.floor(Math.random() * list.length)];
            
            feed.innerHTML += `
                <div class="post">
                    <div><span class="post-tag">${db[k].label}</span><h3>${title}</h3></div>
                    <div class="actions">
                        <button class="btn-like" onclick="vote('${k}', true)">J'aime</button>
                        <button class="btn-dislike" onclick="actionNight()">Bof</button>
                    </div>
                </div>`;
        }
    }

    function vote(k, like) {
        profile[k].i = Math.min(100, profile[k].i + 20);
        if(like) {
            if(profile[k].p >= 50) profile[k].p = Math.min(95, profile[k].p + 15);
            else profile[k].p = Math.max(5, profile[k].p - 15);
        }
        actionNight();
    }

    function actionNight() {
        document.getElementById('night').style.display = 'flex';
        const msgs = ["Tri des données...", "Analyse de vos goûts...", "Filtrage des opinions...", "Construction de votre bulle..."];
        document.getElementById('night-msg').innerText = msgs[Math.floor(Math.random()*msgs.length)];
        
        setTimeout(() => {
            document.getElementById('night').style.display = 'none';
            document.getElementById('day-ui').innerText = "Jour " + (++day);
            render();
        }, 3000); // 3 secondes pour bien laisser le temps d'expliquer
    }

    render();
</script>
</body>
</html>
